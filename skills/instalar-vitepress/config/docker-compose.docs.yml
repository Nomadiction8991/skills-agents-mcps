services:
  docs:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - .:/app
      - docs_node_modules:/app/node_modules
    ports:
      - "5173:5173"
    command: sh -c "npm install && npm run docs:dev -- --host 0.0.0.0"
    environment:
      - NODE_ENV=development

volumes:
  docs_node_modules:
